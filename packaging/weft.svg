<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- surface sombre, cohérente avec le launcher -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#1d1e21"/>
  <!-- fils de chaîne (verticaux), gris clair -->
  <g fill="#ececec">
    <rect x="39.5" y="22" width="9" height="84" rx="4.5"/>
    <rect x="59.5" y="22" width="9" height="84" rx="4.5"/>
    <rect x="79.5" y="22" width="9" height="84" rx="4.5"/>
  </g>
  <!-- fils de trame (horizontaux), accent -->
  <g fill="#ff6363">
    <rect x="22" y="39.5" width="84" height="9" rx="4.5"/>
    <rect x="22" y="59.5" width="84" height="9" rx="4.5"/>
    <rect x="22" y="79.5" width="84" height="9" rx="4.5"/>
  </g>
  <!-- croisements où la chaîne repasse devant : effet de tissage -->
  <g fill="#ececec">
    <rect x="39.5" y="39.5" width="9" height="9" rx="3"/>
    <rect x="79.5" y="39.5" width="9" height="9" rx="3"/>
    <rect x="59.5" y="59.5" width="9" height="9" rx="3"/>
    <rect x="39.5" y="79.5" width="9" height="9" rx="3"/>
    <rect x="79.5" y="79.5" width="9" height="9" rx="3"/>
  </g>
</svg>
